
apiVersion: zenith.stackhpc.com/v1alpha1
kind: Client
metadata:
  name: {{ include "argocd-azimuth.fullname" . }}
  labels: {{ include "argocd-azimuth.labels" . | nindent 4 }}
spec:
  reservationName: {{ include "argocd-azimuth.fullname" . }}
  upstream:
  {{- if contains "argocd" .Release.Name }}
    serviceName: {{ .Release.Name | trunc 63 | trimSuffix "-" }}-server
  {{- else }}
    serviceName: {{ printf "%s-%s" .Release.Name "argocd" }}-server
  {{- end -}}